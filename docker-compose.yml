version: '3.8'

services:
  xorvin-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: xorvin_frontend
    ports:
      - "8080:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
